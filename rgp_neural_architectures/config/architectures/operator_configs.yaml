# RG operator configuration variants

operators:

  standard:
    type: standard
    sigma_w: 1.0
    sigma_b: 0.05
    activation: tanh
    description: Basic RG transformation h^(k) = sigma(W_k h^(k-1) + b_k)

  residual:
    type: residual
    sigma_w: 1.0
    sigma_b: 0.05
    activation: tanh
    description: Adds skip connections for gradient flow preservation

  attention:
    type: attention
    n_heads: 4
    description: Attention-based coarse-graining for long-range dependencies

  wavelet:
    type: wavelet
    description: Haar-like multi-resolution feature decomposition

  learned:
    type: learned
    context_dim: 16
    description: Data-adaptive coarse-graining via hypernetwork

# Sweep configuration for operator ablation studies
ablation_sweep:
  operators: [standard, residual, attention, wavelet, learned]
  depths: [10, 50, 100]
  width: 256
  n_seeds: 5
