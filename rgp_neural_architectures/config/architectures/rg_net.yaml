# RG-Net architecture configuration
# Base parameters for all RG-Net variants

architecture:
  name: rg_net
  operator_type: standard       # standard | residual | attention | wavelet | learned
  activation: tanh              # tanh | relu | gelu
  sigma_w: 1.0                  # weight std at critical init
  sigma_b: 0.05                 # bias std at critical init
  use_batch_norm: false
  use_layer_norm: false

rg_net_shallow:
  depth: 10
  width: 64
  use_case: rapid_prototyping

rg_net_standard:
  depth: 100
  width: 512
  use_case: main_experiments

rg_net_deep:
  depth: 500
  width: 512
  use_case: scaling_studies
  gradient_checkpointing: true

rg_net_ultra_deep:
  depth: 1000
  width: 1024
  use_case: extreme_validation
  gradient_checkpointing: true
  mixed_precision: true

rg_net_variable_width:
  depth: 100
  widths: [512, 384, 256, 128, 64, 128, 256, 384, 512]
  use_case: information_bottleneck

rg_net_multiscale:
  depth: 100
  width: 512
  n_scales: 4
  fusion_mode: concat
  use_case: hierarchical_representations
