# Distributed training configuration (multi-GPU)

defaults:
  - base_training

distributed:
  backend: nccl             # nccl | gloo | mpi
  n_gpus: auto              # auto-detect or specify integer
  sync_batch_norm: true
  find_unused_parameters: false

training:
  batch_size: 512           # effective batch size across all GPUs
  num_workers: 8

optimizer:
  type: adam
  lr: 1.0e-3
  weight_decay: 1.0e-4

gradient_accumulation:
  enabled: false
  steps: 4                  # accumulate over N micro-batches

launch:
  method: torchrun
  n_procs_per_node: auto
