name: Model Validator

on:
  push:
    branches: [main]
    paths: ['src/**', 'checkpoints/**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-checkpoints:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          pip install torch==2.0.1+cpu torchvision==0.15.2+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Check checkpoints
        run: |
          python -c "
          import os, sys, torch

          checkpoint_dir = 'checkpoints'
          if not os.path.exists(checkpoint_dir):
              print('No checkpoints directory — skipping.')
              sys.exit(0)

          checkpoints = [f for f in os.listdir(checkpoint_dir)
                         if f.endswith('.pt') or f.endswith('.pth')]
          if not checkpoints:
              print('No checkpoint files found — skipping.')
              sys.exit(0)

          print(f'Validating {len(checkpoints)} checkpoint(s):')
          errors = []
          for ckpt in sorted(checkpoints):
              path = os.path.join(checkpoint_dir, ckpt)
              try:
                  state = torch.load(path, map_location='cpu')
                  if 'model_state_dict' not in state and 'state_dict' not in state:
                      errors.append(f'{ckpt}: Missing state_dict')
                  else:
                      print(f'  OK: {ckpt}')
              except Exception as e:
                  errors.append(f'{ckpt}: Corrupted — {e}')
                  print(f'  FAIL: {ckpt}')

          if errors:
              for e in errors:
                  print(f'  ERROR: {e}')
              sys.exit(1)
          print('All checkpoints valid.')
          "
