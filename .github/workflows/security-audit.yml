name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['requirements*.txt', 'pyproject.toml']

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          
      - name: Install pip-audit
        run: pip install pip-audit
        
      - name: Run security audit
        run: |
          if [ -f requirements.txt ]; then
            echo "Auditing requirements.txt..."
            pip-audit --requirement requirements.txt --desc || true
          fi
          
          if [ -f requirements-dev.txt ]; then
            echo "Auditing requirements-dev.txt..."
            pip-audit --requirement requirements-dev.txt --desc || true
          fi
          
          pip-audit --desc || true
          
      - name: Check for known vulnerabilities
        run: |
          pip install safety
          safety check --full-report || true
