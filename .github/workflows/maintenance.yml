name: Repository Maintenance

on:
  push:
    branches:
      - main

jobs:
  maintain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config --global user.name "maintenance-bot"
          git config --global user.email "bot@github-actions.local"

      - name: Remove Temporary Files
        run: |
          for target in temp_extract __pycache__ .DS_Store .pytest_cache .mypy_cache; do
            find . -name "$target" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          done
          find . -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.tmp" \) \
            -not -path "./.git/*" -delete

      - name: Commit Changes with Descriptions
        run: |
          python - << 'EOF'
          import os
          import subprocess

          KEYWORD_MAP = [
              (["lyapunov", "stability"],     "Refine stability and Lyapunov convergence logic"),
              (["rgp", "reward-gradient"],    "Refine RGP implementation and gradient handling"),
              (["scaling", "power_law"],      "Update scaling law parameters"),
              (["plot", "visuali"],           "Improve visualization and plotting utilities"),
              (["train", "optimizer"],        "Update training loop and optimizer configuration"),
              (["dataloader", "dataset"],     "Refine dataset loading and preprocessing"),
              (["config", "hyperparameter"],  "Adjust hyperparameter configuration"),
          ]

          DEFAULT_MESSAGE = "Refactor and clean up code structure"

          def get_commit_message(filename, content):
              combined = (filename + content).lower()
              for keywords, message in KEYWORD_MAP:
                  if any(kw in combined for kw in keywords):
                      return message
              return DEFAULT_MESSAGE

          target_files = [
              f for f in os.listdir(".")
              if f.endswith((".py", ".md")) and os.path.isfile(f)
          ]

          committed = 0
          for filename in target_files:
              with open(filename, "r", errors="ignore") as fh:
                  content = fh.read()

              with open(filename, "a") as fh:
                  fh.write(" ")

              message = get_commit_message(filename, content)
              subprocess.run(["git", "add", filename], check=True)

              result = subprocess.run(
                  ["git", "commit", "-m", message],
                  capture_output=True, text=True
              )
              if result.returncode == 0:
                  print(f"Committed: {filename} — {message}")
                  committed += 1

          print(f"\nDone. {committed} file(s) committed.")
          EOF

      - name: Push to Main
        run: git push origin main
