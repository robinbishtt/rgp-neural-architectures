name: Notebook Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert nbformat jupyter ipykernel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          python -m ipykernel install --user --name python3

      - name: Validate Notebook Structure
        run: |
          python - << 'EOF'
          import os
          import nbformat
          import sys

          notebooks = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in [".git", "__pycache__", ".ipynb_checkpoints"]]
              for f in files:
                  if f.endswith(".ipynb"):
                      notebooks.append(os.path.join(root, f))

          if not notebooks:
              print("No notebooks found. Skipping validation.")
              sys.exit(0)

          errors = []
          for path in notebooks:
              try:
                  with open(path) as fh:
                      nb = nbformat.read(fh, as_version=4)
                  nbformat.validate(nb)
                  print(f"Valid:   {path}")
              except nbformat.ValidationError as e:
                  errors.append((path, str(e)))
                  print(f"Invalid: {path} — {e}")

          if errors:
              print(f"\n{len(errors)} notebook(s) failed structural validation.")
              sys.exit(1)

          print(f"\nAll {len(notebooks)} notebook(s) passed structural validation.")
          EOF

      - name: Execute Notebooks
        run: |
          find . -name "*.ipynb" \
            -not -path "./.git/*" \
            -not -path "*/.ipynb_checkpoints/*" | while read notebook; do
              echo "Executing: $notebook"
              jupyter nbconvert \
                --to notebook \
                --execute \
                --ExecutePreprocessor.timeout=120 \
                --output "$notebook" \
                "$notebook"
              echo "Completed: $notebook"
          done

      - name: Upload Executed Notebooks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebooks
          path: "**/*.ipynb"
          retention-days: 7
