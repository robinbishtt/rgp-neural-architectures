name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          pip install torch==2.0.1+cpu torchvision==0.15.2+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --timeout=120 -q

      - name: Run stability tests
        run: pytest tests/stability/ -v --timeout=120 -q

      - name: Run scaling tests
        run: pytest tests/scaling/ -v --timeout=180 -q

      - name: Run spectral tests
        run: pytest tests/spectral/ -v --timeout=120 -q

      - name: Run validation tests
        run: pytest tests/validation/ -v --timeout=120 -q
