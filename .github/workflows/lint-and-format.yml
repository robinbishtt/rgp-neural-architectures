name: Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install black isort flake8 mypy

      - name: Check formatting (black)
        run: black --check --line-length 100 --target-version py311 src/ tests/ experiments/
        continue-on-error: true

      - name: Check import order (isort)
        run: isort --check-only --profile black --line-length 100 src/ tests/
        continue-on-error: true

      - name: Lint (flake8)
        run: |
          flake8 src/ tests/ experiments/ \
            --max-line-length=100 \
            --select=E,F,W \
            --exclude=__pycache__,.git
        continue-on-error: true

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
