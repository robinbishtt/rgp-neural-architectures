name: Reproduce

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      hypothesis:
        description: 'Which hypothesis to validate (h1|h2|h3|all)'
        required: false
        default: 'all'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  reproduce-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          pip install torch==2.0.1+cpu torchvision==0.15.2+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Pipeline smoke test
        run: python scripts/verify_pipeline.py

      - name: Fast-track H1 (Scale Correspondence)
        run: |
          python experiments/h1_scale_correspondence/run_h1_validation.py \
            --fast-track --results-dir results/h1/
        timeout-minutes: 5

      - name: Fast-track H2 (Depth Scaling)
        run: |
          python experiments/h2_depth_scaling/run_h2_validation.py \
            --fast-track --results-dir results/h2/
        timeout-minutes: 5

      - name: Fast-track H3 (Multi-Scale Generalization)
        run: |
          python experiments/h3_multiscale_generalization/run_h3_validation.py \
            --fast-track --results-dir results/h3/
        timeout-minutes: 5

      - name: Generate figures (fast-track)
        run: python figures/generate_all.py --fast-track --output figures/out/
        timeout-minutes: 5

      - name: Validate hypotheses
        run: bash scripts/validate_hypotheses.sh --fast-track

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fast-track-results-${{ github.sha }}
          path: |
            results/
            figures/out/
          if-no-files-found: ignore
          retention-days: 14
