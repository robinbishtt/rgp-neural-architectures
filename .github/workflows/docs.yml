name: Build and Deploy Documentation

on:
  push:
    branches: [main]
    paths: ['docs/**', 'README.md', 'mkdocs.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions
          
      - name: Build documentation
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build
          else
            echo "No mkdocs.yml found. Creating basic config..."
            cat > mkdocs.yml << 'EOF'
          site_name: RGP Neural Architectures
          theme: material
          docs_dir: docs
          site_dir: site
          nav:
            - Home: index.md
          EOF
            mkdocs build
          fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
