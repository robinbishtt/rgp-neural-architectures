# config/experiments/extended_data_reproduction.yaml
# Extended Data figure reproduction parameters.

experiment:
  name: extended_data_reproduction
  seed: 42

extended_figures:
  ed1:
    name: correlation_length_diagnostics
    n_seeds: 30
    widths: [64, 128, 256, 512]
    n_layers: 20
  ed2:
    name: jacobian_spectrum_evolution
    depths: [1, 5, 10, 20, 40]
    n_singular_values: 100
  ed3:
    name: stability_phase_diagram
    sigma_w_range: [0.5, 2.0]
    sigma_w_steps: 40
    sigma_b_range: [0.0, 0.3]
    sigma_b_steps: 20
  ed4:
    name: fss_collapse
    xi_values: [2.0, 5.0, 10.0, 20.0, 50.0]
    widths: [64, 128, 256, 512, 1024]
  ed5:
    name: lyapunov_diagnostics
    n_exponents: 32
    depths: [10, 20, 40, 80]
  ed6:
    name: perturbation_growth
    epsilon: 0.01
    n_layers: 40

output:
  results_dir: results/extended_data
  figures_dir: figures/out
