# Base training configuration shared across all experiments

training:
  seed: 42
  epochs: 100
  batch_size: 256
  num_workers: 4
  pin_memory: true
  persistent_workers: true

optimizer:
  type: adam
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: cosine_annealing
  T_max: 100
  eta_min: 1.0e-6

mixed_precision:
  enabled: false
  dtype: float16        # float16 | bfloat16

gradient_checkpointing:
  enabled: false

logging:
  log_every_n_steps: 50
  save_every_n_epochs: 10
  keep_last_n_checkpoints: 3

early_stopping:
  enabled: true
  patience: 15
  min_delta: 1.0e-4
  monitor: val_loss
