name: rgp-neural
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.9.18

  # PyTorch (GPU - CUDA 11.8)
  # For CPU-only: replace with pytorch-cpu channel and remove cudatoolkit
  - pytorch=2.0.1
  - torchvision=0.15.2
  - torchaudio=2.0.2
  - pytorch-cuda=11.8
  - cudatoolkit=11.8

  # Numerical core
  - numpy=1.24.3
  - scipy=1.11.1
  - sympy=1.12

  # Visualisation
  - matplotlib=3.7.2
  - seaborn=0.12.2

  # Data formats
  - h5py=3.9.0
  - pandas=2.0.3

  # Configuration
  - pyyaml=6.0.1

  # Utilities
  - tqdm=4.65.0
  - joblib=1.3.2

  # Jupyter
  - jupyterlab=4.0.5
  - ipywidgets=8.1.0
  - ipykernel

  # Testing
  - pytest=7.4.3
  - pytest-cov=4.1.0
  - pytest-timeout=2.1.0

  # Code quality
  - black=23.7.0
  - isort=5.12.0
  - flake8=6.0.0

  # pip-only packages
  - pip
  - pip:
    - hydra-core==1.3.2
    - omegaconf==2.3.0
    - wandb==0.15.8
    - tensorboard==2.13.0
    - mlflow==2.6.0
    - loguru==0.7.0
    - rich==13.5.2
    - pyarrow==12.0.1
    - pytest-xdist==3.3.1
    - mypy==1.4.1
    - filelock==3.12.3
    - psutil==5.9.5
    - -e .

# ── CPU-only variant ─────────────────────────────────────────────────
# For CPU-only installation (reviewer fast-track):
#   conda create -n rgp-neural-cpu python=3.9.18
#   pip install torch==2.0.1+cpu torchvision==0.15.2+cpu \
#       --index-url https://download.pytorch.org/whl/cpu
#   pip install -r requirements.txt && pip install -e "[dev]"
