
architecture:
  name: rg_net
  operator_type: standard
  activation: tanh
  sigma_w: 1.2
  sigma_b: 0.3
  use_batch_norm: false
  use_layer_norm: false
  phase_note: "ordered (chi1=0.870 < 1)"

rg_net_shallow:
  depth: 10
  width: 64
  use_case: rapid_prototyping

rg_net_standard:
  depth: 30
  width: 512
  use_case: main_experiments
  note: "depth=30 >> k_c=7.18; gives >4 decay constants, reliable R² fit"

rg_net_deep:
  depth: 500
  width: 512
  use_case: scaling_studies
  gradient_checkpointing: true

rg_net_ultra_deep:
  depth: 1000
  width: 1024
  use_case: extreme_validation
  gradient_checkpointing: true
  mixed_precision: true

rg_net_variable_width:
  depth: 100
  widths: [512, 384, 256, 128, 64, 128, 256, 384, 512]
  use_case: information_bottleneck

rg_net_multiscale:
  depth: 100
  width: 512
  n_scales: 4
  fusion_mode: concat
  use_case: hierarchical_representations
