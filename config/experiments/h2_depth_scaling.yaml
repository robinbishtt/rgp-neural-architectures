# config/experiments/h2_depth_scaling.yaml
# H2: Depth Scaling Law Validation
# Full experiment parameters.

experiment:
  name: h2_depth_scaling
  hypothesis: "H2: L_min ~ log(xi_data / xi_target) with linear slope k_c"
  seed: 42

model:
  type: rg_net_variable
  width: 512
  activation: tanh
  sigma_w: 1.4  # critical init for tanh
  sigma_b: 0.3  # critical init for tanh
  depths: [10, 20, 50, 100, 200, 500]

training:
  epochs: 100
  batch_size: 128
  optimizer: adam
  lr: 1.0e-3
  lr_scheduler: cosine
  accuracy_threshold: 0.95  # paper: minimum depth achieving >=95% accuracy

data:
  dataset: hierarchical_mnist
  train_samples: 50000
  val_samples: 10000
  # Matches Hier-1 to Hier-5 datasets (paper sec 5, Table 1)
  correlation_lengths: [5.0, 15.0, 50.0, 100.0, 200.0]
  xi_target: 1.0

analysis:
  lmin_extraction:
    method: accuracy_threshold
    threshold: 0.85
  model_comparison:
    models: [logarithmic, linear, power_law]
    metric: aic
  bootstrap_n_resamples: 1000
  n_seeds: 10

output:
  results_dir: results/h2
  checkpoint_dir: checkpoints/h2
  log_dir: logs/h2
 