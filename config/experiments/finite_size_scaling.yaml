
experiment:
  name: finite_size_scaling
  seed: 42

fss:
  xi_values: [2.0, 5.0, 10.0, 20.0, 50.0]
  widths: [64, 128, 256, 512, 1024, 2048]
  depths: [10, 50, 100]
  nu_bounds: [0.1, 5.0]
  nu_init: 1.0
  bootstrap_n_resamples: 2000
  bootstrap_confidence: 0.95
  collapse_method: minimize_residuals

output:
  results_dir: results/fss
  log_dir: logs/fss

