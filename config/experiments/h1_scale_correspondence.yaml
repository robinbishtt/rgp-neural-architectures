
experiment:
  name: h1_scale_correspondence
  hypothesis: "H1: xi(k) = xi_0 * exp(-k / k_c) with R² > 0.95"
  seed: 42

model:
  type: rg_net_standard
  depth: 30
  width: 512
  activation: tanh
  sigma_w: 1.2
  sigma_b: 0.3
  chi1_note: "chi1≈0.870, k_c≈7.18, ordered phase"

training:
  epochs: 100
  batch_size: 256
  optimizer: adam
  lr: 1.0e-3
  weight_decay: 1.0e-4
  lr_scheduler: cosine

data:
  dataset: hierarchical_gaussian
  n_train: 5000
  n_val: 1000
  n_classes: 10
  input_dim: 64
  noise_std: xi_data
  num_workers: 4

analysis:
  fisher_method: gradient
  correlation_length:
    method: exponential_decay_fitter
    n_layers_to_analyze: 30
    estimators: [gradient_fisher, exponential_decay]
    r2_threshold: 0.95
  widths: [64, 128, 256, 512]
  n_seeds: 10
  n_train_per_seed: 5000

minimum_viable_config:
  depth: 20
  width: 64
  n_train: 1000
  epochs: 20

output:
  results_dir: results/h1
  checkpoint_dir: checkpoints/h1
  log_dir: logs/h1
  save_frequency: 10
