# config/scaling/fss.yaml
# Finite-size scaling analysis configuration.

fss:
  ansatz: sigmoid
  nu_bounds: [0.1, 5.0]
  nu_init: 1.0
  minimizer: brentq
  bootstrap_n_resamples: 1000
  confidence_level: 0.95

critical_exponents:
  nu:
    description: "Correlation length exponent"
    expected_range: [0.5, 2.0]
  beta:
    description: "Order parameter exponent"
    expected_range: [0.1, 0.5]
  gamma:
    description: "Susceptibility exponent"
    expected_range: [1.0, 2.5]
