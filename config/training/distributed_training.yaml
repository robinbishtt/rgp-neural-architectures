
defaults:
  - base_training

distributed:
  backend: nccl
  n_gpus: auto
  sync_batch_norm: true
  find_unused_parameters: false

training:
  batch_size: 512
  num_workers: 8

optimizer:
  type: adam
  lr: 1.0e-3
  weight_decay: 1.0e-4

gradient_accumulation:
  enabled: false
  steps: 4

launch:
  method: torchrun
  n_procs_per_node: auto

