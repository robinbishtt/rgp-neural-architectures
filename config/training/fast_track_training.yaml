# Fast-track training configuration for reviewer verification
# All scale parameters reduced to complete in 3-5 minutes on any hardware

defaults:
  - base_training

training:
  epochs: 2
  batch_size: 16
  num_workers: 2

fast_track:
  enabled: true
  depth: 10
  width: 64
  dataset_size: 100
  fss_points: 2
  fisher_mc_samples: 100
  correlation_samples: 50
  n_seeds: 1

optimizer:
  lr: 1.0e-3

mixed_precision:
  enabled: false

early_stopping:
  enabled: false

logging:
  log_every_n_steps: 10
  save_every_n_epochs: 1
 